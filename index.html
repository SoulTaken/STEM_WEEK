<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project MathClub STEM Week Arduino Workshop</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(8, 12, 24, 0.72), rgba(8, 12, 24, 0.72)),
        url("pi.jpg") center center / cover no-repeat fixed;
    }

    .container {
      width: 100%;
      max-width: 1080px;
      background: rgba(32, 41, 61, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 28px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 2.3rem;
      line-height: 1.1;
    }

    .connect-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      color: white;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(34,197,94,0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 520px;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.6rem;
    }

    .info-line {
      font-size: 1.1rem;
      margin: 14px 0;
      color: #e2e8f0;
    }

    .label {
      color: #bfdbfe;
      font-weight: bold;
    }

    .keys-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      margin-bottom: 28px;
    }

    .key-row {
      display: flex;
      gap: 12px;
    }

    .key {
      width: 86px;
      height: 86px;
      border-radius: 18px;
      background: rgba(51,65,85,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18);
      transition: all 0.12s ease;
      user-select: none;
    }

    .key.active {
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      color: #082f49;
      border-color: rgba(255,255,255,0.35);
      transform: scale(1.04);
      box-shadow: 0 0 22px rgba(56,189,248,0.28);
    }

    .display-box {
      padding: 16px;
      border-radius: 16px;
      background: rgba(15,23,42,0.68);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }

    .mini-label {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .mini-value {
      font-size: 1.5rem;
      color: #f8fafc;
      font-weight: bold;
      min-height: 30px;
    }

    .log {
      margin-top: 18px;
      height: 250px;
      overflow: auto;
      background: rgba(2,6,23,0.9);
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 0.95rem;
      color: #e0f2fe;
    }

    .footer {
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #cbd5e1;
      font-size: 0.96rem;
      line-height: 1.7;
      text-align: center;
    }

    @media (max-width: 920px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }

      .title-wrap h1 {
        font-size: 1.8rem;
      }

      .key {
        width: 74px;
        height: 74px;
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Project MathClub<br>STEM Week Arduino Workshop</h1>
      </div>
      <button class="connect-btn" onclick="connectBLE()">Connect</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Status</h2>

        <div class="info-line"><span class="label">Device:</span> <span id="device">None</span></div>
        <div class="info-line"><span class="label">Keys Held:</span> <span id="keys">None</span></div>

        <div class="display-box">
          <div class="mini-label">Current Command</div>
          <div id="cmd" class="mini-value">X</div>
        </div>

        <div class="display-box">
          <div class="mini-label">Last Sent</div>
          <div id="sent" class="mini-value">X</div>
        </div>

        <div class="log" id="log"></div>
      </div>

      <div class="card">
        <h2>Controls</h2>

        <div class="keys-panel">
          <div class="key-row">
            <div id="w" class="key">W</div>
          </div>
          <div class="key-row">
            <div id="a" class="key">A</div>
            <div id="s" class="key">S</div>
            <div id="d" class="key">D</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      Project MathClub STEM Week Arduino Workshop • Bluetooth Car Control Interface
    </div>
  </div>

  <script>
    let characteristic = null;
    let pressed = new Set();
    let lastSent = "";
    let sending = false;
    let pendingCommand = null;

    const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const CHAR_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

    function log(msg) {
      const box = document.getElementById("log");
      const t = new Date().toLocaleTimeString();
      box.innerText = `[${t}] ${msg}\n` + box.innerText;
    }

    function updateUI() {
      const held = [...pressed].map(k => k.toUpperCase()).join(", ");
      document.getElementById("keys").innerText = held || "None";

      ["w", "a", "s", "d"].forEach(k => {
        document.getElementById(k).classList.toggle("active", pressed.has(k));
      });
    }

    function buildCommand() {
      const w = pressed.has("w");
      const a = pressed.has("a");
      const s = pressed.has("s");
      const d = pressed.has("d");

      if (w && a) return "WA";
      if (w && d) return "WD";
      if (s && a) return "SA";
      if (s && d) return "SD";
      if (w) return "W";
      if (a) return "A";
      if (s) return "S";
      if (d) return "D";
      return "X";
    }

    async function writeBLE(cmd) {
      if (!characteristic) {
        log("Not connected: " + cmd);
        return false;
      }

      const data = new TextEncoder().encode(cmd + "\n");
      await characteristic.writeValue(data);
      return true;
    }

    async function flushCommand(cmd) {
      if (sending) {
        pendingCommand = cmd;
        return;
      }

      if (cmd === lastSent && pendingCommand === null) return;

      sending = true;

      try {
        document.getElementById("cmd").innerText = cmd;

        const ok = await writeBLE(cmd);
        if (ok) {
          lastSent = cmd;
          document.getElementById("sent").innerText = cmd;
          log("Sent: " + cmd);
        }
      } catch (err) {
        console.error(err);
        log("Send failed: " + cmd);
      } finally {
        sending = false;

        if (pendingCommand !== null) {
          const next = pendingCommand;
          pendingCommand = null;

          if (next !== lastSent) {
            await flushCommand(next);
          }
        }
      }
    }

    async function updateAndSend() {
      updateUI();
      const cmd = buildCommand();
      document.getElementById("cmd").innerText = cmd;
      await flushCommand(cmd);
    }

    async function connectBLE() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: "HM" }],
          optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHAR_UUID);

        document.getElementById("device").innerText = device.name || "HM-10";
        log("Connected to " + (device.name || "HM-10"));
      } catch (err) {
        console.error(err);
        log("Connection failed");
      }
    }

    document.addEventListener("keydown", async (e) => {
      const k = e.key.toLowerCase();
      if (!["w", "a", "s", "d"].includes(k)) return;

      e.preventDefault();

      if (!pressed.has(k)) {
        pressed.add(k);
        await updateAndSend();
      }
    });

    document.addEventListener("keyup", async (e) => {
      const k = e.key.toLowerCase();
      if (!["w", "a", "s", "d"].includes(k)) return;

      e.preventDefault();

      if (pressed.has(k)) {
        pressed.delete(k);
        await updateAndSend();
      }
    });

    window.addEventListener("blur", async () => {
      pressed.clear();
      await updateAndSend();
    });
  </script>
</body>
</html>
