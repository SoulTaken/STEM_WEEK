<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE Car Control</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b,#0b1120);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  width: 900px;
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
button {
  background: #22c55e;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}
.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 15px;
}
.key {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  background: #334155;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  margin: 5px;
}
.active {
  background: #38bdf8;
}
.keys {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.row {
  display: flex;
}
.big {
  font-size: 30px;
  color: #38bdf8;
}
.log {
  height: 150px;
  overflow: auto;
  background: #0b1220;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  white-space: pre-wrap;
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>BLE Car Control</h1>
    <button onclick="connectBLE()">Connect</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Status</h3>
      <p>Device: <span id="device">None</span></p>
      <p>Keys: <span id="keys">None</span></p>
      <p>Command:</p>
      <div id="cmd" class="big">X</div>
      <p>Sent:</p>
      <div id="sent" class="big">X</div>
      <div class="log" id="log"></div>
    </div>

    <div class="card">
      <h3>Controls</h3>
      <div class="keys">
        <div class="row">
          <div id="w" class="key">W</div>
        </div>
        <div class="row">
          <div id="a" class="key">A</div>
          <div id="s" class="key">S</div>
          <div id="d" class="key">D</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let characteristic;
let pressed = new Set();
let lastSent = "";

const SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
const CHAR = "0000ffe1-0000-1000-8000-00805f9b34fb";

function log(msg){
  const l = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  l.innerText = `[${time}] ${msg}\n` + l.innerText;
}

function updateUI(){
  document.getElementById("keys").innerText =
    [...pressed].join(", ").toUpperCase() || "None";

  ["w","a","s","d"].forEach(k=>{
    document.getElementById(k).classList.toggle("active", pressed.has(k));
  });
}

function buildCommand(){
  const w = pressed.has("w");
  const a = pressed.has("a");
  const s = pressed.has("s");
  const d = pressed.has("d");

  if (w && a) return "WA";
  if (w && d) return "WD";
  if (s && a) return "SA";
  if (s && d) return "SD";
  if (w) return "W";
  if (a) return "A";
  if (s) return "S";
  if (d) return "D";
  return "X";
}

async function send(cmd){
  document.getElementById("cmd").innerText = cmd;

  if(!characteristic){
    log("Not connected: " + cmd);
    return;
  }

  if(cmd === lastSent) return;

  try {
    const data = new TextEncoder().encode(cmd + "\n");
    await characteristic.writeValue(data);
    lastSent = cmd;
    document.getElementById("sent").innerText = cmd;
    log("Sent: " + cmd);
  } catch(err) {
    console.error(err);
    log("Send failed: " + cmd);
  }
}

async function updateAndSend(){
  updateUI();
  const cmd = buildCommand();
  await send(cmd);
}

async function connectBLE(){
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:"HM"}],
      optionalServices:[SERVICE]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE);
    characteristic = await service.getCharacteristic(CHAR);

    document.getElementById("device").innerText = device.name || "HM-10";
    log("Connected");
  } catch(err) {
    console.error(err);
    log("Connection failed");
  }
}

document.addEventListener("keydown", async e => {
  const k = e.key.toLowerCase();
  if (!["w","a","s","d"].includes(k)) return;

  e.preventDefault();

  if (!pressed.has(k)) {
    pressed.add(k);
    await updateAndSend();
  }
});

document.addEventListener("keyup", async e => {
  const k = e.key.toLowerCase();
  if (!["w","a","s","d"].includes(k)) return;

  e.preventDefault();

  if (pressed.has(k)) {
    pressed.delete(k);
    await updateAndSend();
  }
});

window.addEventListener("blur", async () => {
  pressed.clear();
  await updateAndSend();
});
</script>
</body>
</html>
