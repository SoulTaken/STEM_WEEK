<script>
  let characteristic = null;
  let pressed = new Set();
  let lastSent = "";

  const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
  const CHARACTERISTIC_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

  function logMessage(msg) {
    const log = document.getElementById("eventLog");
    const time = new Date().toLocaleTimeString();
    log.textContent = `[${time}] ${msg}\n` + log.textContent;
  }

  function updateUI() {
    const keys = Array.from(pressed).map(k => k.toUpperCase()).join(", ");
    document.getElementById("currentKey").textContent = keys || "None";

    ["w", "a", "s", "d"].forEach(k => {
      const el = document.getElementById(`key-${k}`);
      if (el) {
        if (pressed.has(k)) el.classList.add("active");
        else el.classList.remove("active");
      }
    });
  }

  function buildCommand() {
    const w = pressed.has("w");
    const a = pressed.has("a");
    const s = pressed.has("s");
    const d = pressed.has("d");

    if (w && a) return "WA";
    if (w && d) return "WD";
    if (s && a) return "SA";
    if (s && d) return "SD";
    if (w) return "W";
    if (a) return "A";
    if (s) return "S";
    if (d) return "D";
    return "X";
  }

  async function sendCommand(cmd) {
    document.getElementById("lastSentValue").textContent = cmd;

    if (!characteristic) {
      logMessage(`Not sent (not connected): ${cmd}`);
      return;
    }

    if (cmd === lastSent) return;

    try {
      const data = new TextEncoder().encode(cmd);
      await characteristic.writeValue(data);
      lastSent = cmd;
      logMessage(`Sent to Bluetooth: ${cmd}`);
    } catch (error) {
      console.error(error);
      logMessage(`Send failed: ${cmd}`);
    }
  }

  async function updateAndSend() {
    updateUI();
    const cmd = buildCommand();
    await sendCommand(cmd);
  }

  async function connectBLE() {
    try {
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: "HM" }],
        optionalServices: [SERVICE_UUID]
      });

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      document.getElementById("deviceName").textContent = device.name || "HM-10";

      const status = document.getElementById("status");
      status.textContent = "Connected";
      status.classList.add("connected");

      logMessage(`Connected to ${device.name || "HM-10"}`);
    } catch (error) {
      console.error(error);
      alert("Connection failed.");
    }
  }

  document.addEventListener("keydown", async (e) => {
    const key = e.key.toLowerCase();

    if (!["w", "a", "s", "d"].includes(key)) return;
    e.preventDefault();

    if (!pressed.has(key)) {
      pressed.add(key);
      await updateAndSend();
    }
  });

  document.addEventListener("keyup", async (e) => {
    const key = e.key.toLowerCase();

    if (!["w", "a", "s", "d"].includes(key)) return;
    e.preventDefault();

    if (pressed.has(key)) {
      pressed.delete(key);
      await updateAndSend();
    }
  });

  window.addEventListener("blur", async () => {
    pressed.clear();
    await updateAndSend();
  });
</script>
